# Gradle daemon (keep total reasonable if your PC has 8 GB RAM — use 2048m–3072m)
org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1024m -XX:+UseG1GC -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8
org.gradle.daemon=true
org.gradle.parallel=false
org.gradle.caching=true
org.gradle.workers.max=2

# Kotlin compiler daemon
kotlin.daemon.jvmargs=-Xmx2048m

# Android Java compile + D8 dex (fixes OutOfMemoryError during assembleDebug)
android.javaCompile.maxHeapSize=3072m
android.dexing.jvmargs=-Xmx3072m

android.useAndroidX=true
