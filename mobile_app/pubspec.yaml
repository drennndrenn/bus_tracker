name: smart_bus_tracker_mobile
description: Smart Bus Tracker mobile app built with Flutter.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_map: any
  latlong2: any
  http: any
  shared_preferences: ^2.3.3
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.4
  cloud_firestore: ^5.6.7
  image_picker: ^1.1.2
  image: ^4.5.4
  qr_flutter: ^4.1.0
  video_player: ^2.9.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/logo.png
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: assets/logo.png

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
    - assets/ads/
